services:
  searxng:
    container_name: searxng
    build:
      dockerfile_inline: |
        FROM docker.io/searxng/searxng:latest
        RUN /usr/local/searxng/.venv/bin/python3 -m ensurepip && \
            /usr/local/searxng/.venv/bin/python3 -m pip install --no-cache-dir searxng-bm25-reranker && \
            /usr/local/searxng/.venv/bin/python3 -m pip uninstall -y pip
    restart: always
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./searxng/settings.private.yml:/etc/searxng/settings.yml:rw
    env_file:
      - .env
    environment:
      - SEARXNG_SETTINGS_PATH=/etc/searxng/settings.yml
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - firecrawl-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  playwright-service:
    image: ghcr.io/firecrawl/playwright-service:latest
    restart: unless-stopped
    environment:
      PORT: 3000
      BLOCK_MEDIA: "true"
    shm_size: "1gb"

  nuq-postgres:
    image: ghcr.io/firecrawl/nuq-postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - firecrawl-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: firecrawl
      RABBITMQ_DEFAULT_PASS: firecrawl-local-only
    volumes:
      - firecrawl-rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  firecrawl:
    image: ghcr.io/firecrawl/firecrawl:latest
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: 3002
      USE_DB_AUTHENTICATION: ${USE_DB_AUTHENTICATION:-false}
      BULL_AUTH_KEY: ${BULL_AUTH_KEY}

      REDIS_URL: redis://redis:6379
      REDIS_RATE_LIMIT_URL: redis://redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://playwright-service:3000/scrape

      NUQ_DATABASE_URL: postgresql://postgres:postgres@nuq-postgres:5432/postgres
      NUQ_BACKEND: pg
      NUQ_RABBITMQ_URL: amqp://firecrawl:firecrawl-local-only@rabbitmq:5672

      NUM_WORKERS_PER_QUEUE: ${NUM_WORKERS_PER_QUEUE:-2}
      CRAWL_CONCURRENT_REQUESTS: ${CRAWL_CONCURRENT_REQUESTS:-2}
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-2}
      BROWSER_POOL_SIZE: ${BROWSER_POOL_SIZE:-1}
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      redis:
        condition: service_healthy
      playwright-service:
        condition: service_started
      nuq-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  firecrawl-redis:
  firecrawl-postgres:
  firecrawl-rabbitmq:
