# ==============================================================================
# SEARXNG CONFIGURATION FOR PROWL v0.1
# ==============================================================================

use_default_settings:
  engines:
    keep_only:
      - google
      - bing
      - yandex
      - duckduckgo
      - marginalia
      - wiby
      - searchmysite
      - brave
      - mojeek
      - qwant
      - startpage
      - baidu
      - sogou
      - 360search
      - erowid
      - pubmed
      - google scholar
      - reddit
      - github

search:
  safe_search: 0
  formats:
    - html
    - json  # Essential for Prowl's query rotation script to parse raw data

server:
  limiter: false  # Turn off the limiter so your programmatic loops run smoothly
  secret_key: "prowl_super_secret_local_key"

# 1. TELL SEARXNG TO ENABLE THE HOSTNAMES PLUGIN
plugins:
  searx.plugins.hostnames.SXNGPlugin:
    active: true

# 2. CONFIGURE THE HOSTNAMES PLUGIN SETTINGS (TOP LEVEL)
hostnames:
  remove:
    - chatgpt.com
    - perplexity.ai
  high_priority:
    - wikipedia.org
    - github.com
    - arxiv.org
# ==============================================================================
# ENGINE SPECIFIC PROXY ROUTING
# ==============================================================================
engines:
  # ----------------------------------------------------------------------------
  # Asian Routing (Illinois Proxy)
  # ----------------------------------------------------------------------------
  - name: baidu
    engine: baidu
    shortcut: bd
    proxies:
      http: "http://prowl_agent:${PROXY_PASS}@${PROXY_IP_ILLINOIS}:49200"
      https: "http://prowl_agent:${PROXY_PASS}@${PROXY_IP_ILLINOIS}:49200"

  - name: sogou
    engine: sogou
    proxies:
      http: "http://prowl_agent:${PROXY_PASS}@${PROXY_IP_ILLINOIS}:49200"
      https: "http://prowl_agent:${PROXY_PASS}@${PROXY_IP_ILLINOIS}:49200"

  - name: 360search
    engine: 360search
    proxies:
      http: "http://prowl_agent:${PROXY_PASS}@${PROXY_IP_ILLINOIS}:49200"
      https: "http://prowl_agent:${PROXY_PASS}@${PROXY_IP_ILLINOIS}:49200"

  # ----------------------------------------------------------------------------
  # Eurasian/Russian Routing (Mexico Proxy)
  # ----------------------------------------------------------------------------
  - name: yandex
    engine: yandex
    shortcut: yd
    proxies:
      http: "http://prowl_agent:${PROXY_PASS}@${PROXY_IP_MEXICO}:49200"
      https: "http://prowl_agent:${PROXY_PASS}@${PROXY_IP_MEXICO}:49200"
